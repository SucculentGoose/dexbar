name: DexBar
options:
  bundleIdPrefix: com.dexbar
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true
  xcodeVersion: "15"

settings:
  base:
    SWIFT_VERSION: "6.0"
    ENABLE_HARDENED_RUNTIME: YES
    CODE_SIGN_STYLE: Automatic
    MACOSX_DEPLOYMENT_TARGET: "14.0"

targets:
  DexBar:
    type: application
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: DexBar/Sources
        excludes: []
      - path: DexBar/Assets.xcassets
    info:
      path: DexBar/Info.plist
      properties:
        CFBundleName: DexBar
        CFBundleDisplayName: DexBar
        CFBundleIdentifier: com.dexbar.app
        CFBundleVersion: "1"
        CFBundleShortVersionString: "1.0.0"
        NSPrincipalClass: NSApplication
        LSUIElement: true
        NSUserNotificationsUsageDescription: "DexBar sends alerts for blood sugar levels."
        NSHumanReadableDescription: "Blood sugar readings from Dexcom in your menu bar."
    entitlements:
      path: DexBar/DexBar.entitlements
      properties:
        com.apple.security.app-sandbox: false
        com.apple.security.network.client: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.dexbar.app
        INFOPLIST_FILE: DexBar/Info.plist
        CODE_SIGN_ENTITLEMENTS: DexBar/DexBar.entitlements
