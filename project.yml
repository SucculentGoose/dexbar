name: DexBar
options:
  bundleIdPrefix: com.dexbar
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true
  xcodeVersion: "15"

settings:
  base:
    SWIFT_VERSION: "6.0"
    ENABLE_HARDENED_RUNTIME: YES
    CODE_SIGN_STYLE: Automatic
    MACOSX_DEPLOYMENT_TARGET: "14.0"

packages:
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: "2.9.0"
  DexBarCore:
    path: .

targets:
  DexBar:
    type: application
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: DexBar/Sources
        excludes: []
      - path: DexBar/Assets.xcassets
    info:
      path: DexBar/Info.plist
      properties:
        CFBundleName: DexBar
        CFBundleDisplayName: DexBar
        CFBundleIdentifier: com.dexbar.app
        CFBundleVersion: "$(MARKETING_VERSION)"
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        NSPrincipalClass: NSApplication
        LSUIElement: true
        NSUserNotificationsUsageDescription: "DexBar sends alerts for blood sugar levels."
        NSHumanReadableDescription: "Blood sugar readings from Dexcom in your menu bar."
        SUFeedURL: "https://raw.githubusercontent.com/SucculentGoose/dexbar/main/appcast.xml"
        SUEnableAutomaticChecks: true
        SUPublicEDKey: "lph61xMGvNVzuOOFx95/0S9GvWAzZdvfUrYqxQJJkQA="
    dependencies:
      - package: DexBarCore
        product: DexBarCore
      - package: Sparkle
        product: Sparkle
    entitlements:
      path: DexBar/DexBar.entitlements
      properties:
        com.apple.security.app-sandbox: false
        com.apple.security.network.client: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.dexbar.app
        INFOPLIST_FILE: DexBar/Info.plist
        CODE_SIGN_ENTITLEMENTS: DexBar/DexBar.entitlements
        CODE_SIGN_ALLOW_ENTITLEMENTS_MODIFICATION: YES
        MARKETING_VERSION: "1.5.2"

  DexBarTests:
    type: bundle.unit-test
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: DexBarTests
    dependencies:
      - target: DexBar
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.dexbar.app.tests
        GENERATE_INFOPLIST_FILE: YES

schemes:
  DexBar:
    build:
      targets:
        DexBar: all
    run:
      config: Debug
      executable: DexBar
    test:
      config: Debug
      targets:
        - DexBarTests
