name: Release

on:
  push:
    branches:
      - main
    paths:
      - VERSION
  workflow_dispatch:

jobs:
  build:
    name: Build & Package
    runs-on: macos-15
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.RELEASE_PAT }}

      - name: Read version
        run: echo "APP_VERSION=$(cat VERSION)" >> $GITHUB_ENV

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Install Sparkle tools
        run: |
          curl -sSL https://github.com/sparkle-project/Sparkle/releases/download/2.9.0/Sparkle-2.9.0.tar.xz -o sparkle.tar.xz
          mkdir -p sparkle_tools
          tar -xJf sparkle.tar.xz -C sparkle_tools
          chmod +x sparkle_tools/bin/sign_update
          echo "SIGN_UPDATE=$(pwd)/sparkle_tools/bin/sign_update" >> $GITHUB_ENV

      - name: Set version in project.yml
        run: |
          sed -i '' 's/MARKETING_VERSION:.*/MARKETING_VERSION: "${{ env.APP_VERSION }}"/' project.yml

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build (ad-hoc signed)
        run: |
          xcodebuild \
            -project DexBar.xcodeproj \
            -scheme DexBar \
            -configuration Release \
            -archivePath build/DexBar.xcarchive \
            archive \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Export .app
        run: |
          mkdir -p build/export
          cp -R build/DexBar.xcarchive/Products/Applications/DexBar.app build/export/DexBar.app

      - name: Sign app bundle (ad-hoc)
        run: |
          APP=build/export/DexBar.app
          SPARKLE="$APP/Contents/Frameworks/Sparkle.framework/Versions/B"
          codesign --force --sign - "$SPARKLE/XPCServices/Installer.xpc"
          codesign --force --sign - "$SPARKLE/XPCServices/Downloader.xpc"
          codesign --force --sign - "$APP/Contents/Frameworks/Sparkle.framework"
          codesign --force --sign - "$APP"

      - name: Create .zip
        run: |
          cd build/export
          zip -r ../../DexBar-v${{ env.APP_VERSION }}.zip DexBar.app

      - name: Sign update with Sparkle
        env:
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
        run: |
          SIGN_UPDATE="${{ env.SIGN_UPDATE }}"
          xattr -d com.apple.quarantine "$SIGN_UPDATE" 2>/dev/null || true

          # Write key to a temp file (sign_update doesn't support stdin)
          KEY_FILE=$(mktemp)
          printf '%s' "$SPARKLE_PRIVATE_KEY" > "$KEY_FILE"

          SIGN_OUTPUT=$("$SIGN_UPDATE" "DexBar-v${{ env.APP_VERSION }}.zip" --ed-key-file "$KEY_FILE")
          rm -f "$KEY_FILE"

          # sign_update outputs: sparkle:edSignature="<base64>" length="<bytes>"
          # Extract just the base64 signature value
          SIGNATURE=$(echo "$SIGN_OUTPUT" | sed -n 's/.*sparkle:edSignature="\([^"]*\)".*/\1/p')

          echo "SPARKLE_SIGNATURE=$SIGNATURE" >> $GITHUB_ENV
          echo "ZIP_SIZE=$(wc -c < "DexBar-v${{ env.APP_VERSION }}.zip" | tr -d ' ')" >> $GITHUB_ENV

      - name: Update appcast.xml
        env:
          APP_VERSION: ${{ env.APP_VERSION }}
          SPARKLE_SIGNATURE: ${{ env.SPARKLE_SIGNATURE }}
          ZIP_SIZE: ${{ env.ZIP_SIZE }}
        run: |
          python3 - <<'EOF'
          import os

          version   = os.environ["APP_VERSION"]
          signature = os.environ["SPARKLE_SIGNATURE"]
          zip_size  = os.environ["ZIP_SIZE"]
          from datetime import datetime, timezone
          pub_date  = datetime.now(timezone.utc).strftime("%a, %d %b %Y %H:%M:%S +0000")
          dl_url    = f"https://github.com/SucculentGoose/dexbar/releases/download/v{version}/DexBar-v{version}.zip"

          item = (
              "        <item>\n"
              f"            <title>DexBar {version}</title>\n"
              f"            <pubDate>{pub_date}</pubDate>\n"
              f"            <sparkle:version>{version}</sparkle:version>\n"
              f"            <sparkle:shortVersionString>{version}</sparkle:shortVersionString>\n"
              "            <sparkle:minimumSystemVersion>14.0</sparkle:minimumSystemVersion>\n"
              "            <enclosure\n"
              f'                url="{dl_url}"\n'
              f'                length="{zip_size}"\n'
              '                type="application/octet-stream"\n'
              f'                sparkle:edSignature="{signature}"\n'
              "            />\n"
              "        </item>"
          )

          placeholder = "        <!-- Releases are added here automatically by the GitHub Actions release workflow -->"
          with open("appcast.xml", "r") as f:
              content = f.read()
          content = content.replace(placeholder, item + "\n" + placeholder)
          with open("appcast.xml", "w") as f:
              f.write(content)
          EOF

      - name: Tag and commit updated appcast.xml
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add appcast.xml project.yml
          git commit -m "chore: update appcast for v${{ env.APP_VERSION }}"
          if git ls-remote --tags origin | grep -q "refs/tags/v${{ env.APP_VERSION }}$"; then
            git push --no-tags origin HEAD:main
          else
            git tag "v${{ env.APP_VERSION }}"
            git push origin HEAD:main --tags
          fi

      - name: Extract release notes from CHANGELOG
        run: |
          python3 - <<'EOF'
          import re
          with open("CHANGELOG.md") as f:
              content = f.read()
          # Find the first version section and extract until the next one
          match = re.search(r'(## \[\d+\.\d+\.\d+\].*?)(?=\n## \[|\Z)', content, re.DOTALL)
          notes = match.group(1).strip() if match else "See CHANGELOG.md for details."
          footer = """
          ---
          ### Installation
          **macOS:** Download **DexBar-v{version}.zip**, unzip, drag to `/Applications`. First launch: `xattr -cr /Applications/DexBar.app`

          **Windows:** Download **DexBarSetup-v{version}.exe** and run the installer.

          **Linux:** Download the tarball and run `install.sh`.

          Then click the tray/menu bar icon → **Settings** → enter your Dexcom credentials.
          """.format(version=open("VERSION").read().strip())
          with open("release_notes.md", "w") as f:
              f.write(notes + "\n" + footer)
          EOF

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.APP_VERSION }}
          name: DexBar v${{ env.APP_VERSION }}
          body_path: release_notes.md
          files: DexBar-v${{ env.APP_VERSION }}.zip

  build-linux:
    name: Build Linux Binary
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.RELEASE_PAT }}

      - name: Read version
        run: echo "APP_VERSION=$(cat VERSION)" >> $GITHUB_ENV

      - name: Install Swift
        uses: swift-actions/setup-swift@v2
        with:
          swift-version: "6.0"

      - name: Install GTK dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y \
            libgtk-4-dev \
            libdbusmenu-glib-dev \
            libsecret-1-dev \
            libnotify-dev \
            meson \
            ninja-build \
            libgirepository1.0-dev \
            valac

      - name: Build gtk4-layer-shell from source
        run: |
          git clone --depth 1 https://github.com/wmww/gtk4-layer-shell.git
          cd gtk4-layer-shell
          meson setup build -Dexamples=false -Ddocs=false -Dtests=false
          ninja -C build
          sudo ninja -C build install
          sudo ldconfig

      - name: Stamp version into AppVersion.swift
        run: |
          sed -i "s/static let current = \".*\"/static let current = \"${{ env.APP_VERSION }}\"/" \
            DexBarLinux/Sources/AppVersion.swift

      - name: Build Linux binary
        run: swift build -c release --product DexBarLinux

      - name: Package binary
        run: |
          mkdir -p dist
          cp .build/release/DexBarLinux dist/dexbar
          cp install.sh dist/
          cp DexBar/Assets.xcassets/AppIcon.appiconset/AppIcon.png dist/icon.png
          cd dist
          tar czf ../dexbar-linux-x86_64-v${{ env.APP_VERSION }}.tar.gz dexbar install.sh icon.png

      - name: Upload Linux binary to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.APP_VERSION }}
          files: dexbar-linux-x86_64-v${{ env.APP_VERSION }}.tar.gz

      - name: Update appcast-linux.xml
        env:
          APP_VERSION: ${{ env.APP_VERSION }}
        run: |
          python3 - <<'EOF'
          import os, subprocess
          from datetime import datetime, timezone

          version  = os.environ["APP_VERSION"]
          pub_date = datetime.now(timezone.utc).strftime("%a, %d %b %Y %H:%M:%S +0000")
          dl_url   = f"https://github.com/SucculentGoose/dexbar/releases/download/v{version}/dexbar-linux-x86_64-v{version}.tar.gz"
          size     = os.path.getsize(f"dexbar-linux-x86_64-v{version}.tar.gz")

          item = (
              "        <item>\n"
              f"            <title>DexBar Linux {version}</title>\n"
              f"            <pubDate>{pub_date}</pubDate>\n"
              f"            <sparkle:version>{version}</sparkle:version>\n"
              f"            <sparkle:shortVersionString>{version}</sparkle:shortVersionString>\n"
              "            <enclosure\n"
              f'                url="{dl_url}"\n'
              f'                length="{size}"\n'
              '                type="application/octet-stream"\n'
              "            />\n"
              "        </item>"
          )

          placeholder = "        <!-- Linux releases are added here automatically by the GitHub Actions release workflow -->"
          with open("appcast-linux.xml", "r") as f:
              content = f.read()
          content = content.replace(placeholder, item + "\n" + placeholder)
          with open("appcast-linux.xml", "w") as f:
              f.write(content)
          EOF

      - name: Commit updated appcast-linux.xml
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add appcast-linux.xml DexBarLinux/Sources/AppVersion.swift
          git commit -m "chore: update linux appcast for v${{ env.APP_VERSION }}"
          git pull --rebase origin main
          if git ls-remote --tags origin | grep -q "refs/tags/v${{ env.APP_VERSION }}$"; then
            git push --no-tags origin HEAD:main
          else
            git push origin HEAD:main
          fi

  build-windows:
    name: Build Windows Binary
    runs-on: windows-latest
    needs: build
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.RELEASE_PAT }}

      - name: Read version
        shell: pwsh
        run: echo "APP_VERSION=$(Get-Content VERSION)" >> $env:GITHUB_ENV

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Stamp version into csproj
        shell: pwsh
        run: |
          $csproj = "DexBarWindows/DexBarWindows.csproj"
          (Get-Content $csproj) -replace '<Version>.*</Version>', "<Version>${{ env.APP_VERSION }}</Version>" |
            Set-Content $csproj

      - name: Publish app
        run: >
          dotnet publish DexBarWindows/DexBarWindows.csproj
          -c Release
          -r win-x64
          --self-contained
          -p:Version=${{ env.APP_VERSION }}

      - name: Build installer with Inno Setup
        shell: pwsh
        env:
          APP_VERSION: ${{ env.APP_VERSION }}
        run: |
          $iss = "DexBarWindows/installer.iss"
          (Get-Content $iss) -replace '#define MyAppVersion ".*"', "#define MyAppVersion `"$env:APP_VERSION`"" |
            Set-Content $iss
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" $iss

      - name: Rename installer
        shell: pwsh
        env:
          APP_VERSION: ${{ env.APP_VERSION }}
        run: |
          Move-Item "DexBarWindows/installer-output/DexBarSetup-$env:APP_VERSION.exe" `
                    "DexBarSetup-v$env:APP_VERSION.exe"

      - name: Upload Windows installer to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.APP_VERSION }}
          files: DexBarSetup-v${{ env.APP_VERSION }}.exe

      - name: Update appcast-windows.xml
        env:
          APP_VERSION: ${{ env.APP_VERSION }}
        shell: pwsh
        run: |
          $script = @'
          import os
          from datetime import datetime, timezone

          version  = os.environ["APP_VERSION"]
          pub_date = datetime.now(timezone.utc).strftime("%a, %d %b %Y %H:%M:%S +0000")
          dl_url   = f"https://github.com/SucculentGoose/dexbar/releases/download/v{version}/DexBarSetup-v{version}.exe"
          size     = os.path.getsize(f"DexBarSetup-v{version}.exe")

          item = (
              "        <item>\n"
              f"            <title>DexBar Windows {version}</title>\n"
              f"            <pubDate>{pub_date}</pubDate>\n"
              f"            <sparkle:version>{version}</sparkle:version>\n"
              f"            <sparkle:shortVersionString>{version}</sparkle:shortVersionString>\n"
              "            <enclosure\n"
              f'                url="{dl_url}"\n'
              f'                length="{size}"\n'
              '                type="application/octet-stream"\n'
              "            />\n"
              "        </item>"
          )

          placeholder = "        <!-- Windows releases are added here automatically by the GitHub Actions release workflow -->"
          with open("appcast-windows.xml", "r") as f:
              content = f.read()
          content = content.replace(placeholder, item + "\n" + placeholder)
          with open("appcast-windows.xml", "w") as f:
              f.write(content)
          '@
          $script | python3 -

      - name: Commit updated appcast-windows.xml
        shell: pwsh
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add appcast-windows.xml
          git commit -m "chore: update windows appcast for v${{ env.APP_VERSION }}"
          git stash
          git pull --rebase origin main
          git stash pop
          git push origin HEAD:main
