name: Release

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  build:
    name: Build & Package
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Install Sparkle tools
        run: |
          brew install --cask sparkle
          xattr -dr com.apple.quarantine /opt/homebrew/Caskroom/sparkle/*/bin/sign_update

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build (ad-hoc signed)
        run: |
          xcodebuild \
            -project DexBar.xcodeproj \
            -scheme DexBar \
            -configuration Release \
            -archivePath build/DexBar.xcarchive \
            archive \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Export .app
        run: |
          mkdir -p build/export
          cp -R build/DexBar.xcarchive/Products/Applications/DexBar.app build/export/DexBar.app

      - name: Create .zip
        run: |
          cd build/export
          zip -r ../../DexBar-${{ github.ref_name }}.zip DexBar.app

      - name: Sign update with Sparkle
        env:
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
        run: |
          SIGN_UPDATE=/opt/homebrew/Caskroom/sparkle/*/bin/sign_update
          SIGNATURE=$(echo "$SPARKLE_PRIVATE_KEY" | $SIGN_UPDATE DexBar-${{ github.ref_name }}.zip -)
          echo "SPARKLE_SIGNATURE=$SIGNATURE" >> $GITHUB_ENV
          echo "ZIP_SIZE=$(wc -c < DexBar-${{ github.ref_name }}.zip | tr -d ' ')" >> $GITHUB_ENV

      - name: Update appcast.xml
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"  # strip leading 'v'
          DOWNLOAD_URL="https://github.com/SucculentGoose/dexbar/releases/download/${{ github.ref_name }}/DexBar-${{ github.ref_name }}.zip"
          PUB_DATE=$(date -u +"%a, %d %b %Y %H:%M:%S +0000")

          NEW_ITEM="        <item>
            <title>DexBar ${VERSION}</title>
            <pubDate>${PUB_DATE}</pubDate>
            <sparkle:version>${VERSION}</sparkle:version>
            <sparkle:shortVersionString>${VERSION}</sparkle:shortVersionString>
            <sparkle:minimumSystemVersion>14.0</sparkle:minimumSystemVersion>
            <enclosure
                url=\"${DOWNLOAD_URL}\"
                length=\"${{ env.ZIP_SIZE }}\"
                type=\"application/octet-stream\"
                sparkle:edSignature=\"${{ env.SPARKLE_SIGNATURE }}\"
            />
        </item>"

          # Insert new item after the last comment line in the channel
          python3 - <<EOF
          import re, sys
          with open('appcast.xml', 'r') as f:
              content = f.read()
          item = """${NEW_ITEM}"""
          content = content.replace('        <!-- Releases are added here automatically by the GitHub Actions release workflow -->', item + '\n        <!-- Releases are added here automatically by the GitHub Actions release workflow -->')
          with open('appcast.xml', 'w') as f:
              f.write(content)
          EOF

      - name: Commit updated appcast.xml
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add appcast.xml
          git commit -m "chore: update appcast for ${{ github.ref_name }}"
          git push origin HEAD:main

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: DexBar ${{ github.ref_name }}
          body: |
            ## DexBar ${{ github.ref_name }}

            ### Installation
            1. Download **DexBar-${{ github.ref_name }}.zip** below
            2. Unzip and drag **DexBar.app** to your `/Applications` folder
            3. Right-click → **Open** the first time to bypass Gatekeeper (required for unsigned apps)
            4. Click the icon in your menu bar → **Settings** → enter your Dexcom credentials

            ### Updates
            Once installed, DexBar will automatically check for updates. You can also check manually via **Settings → Updates**.

            > This build is unsigned. macOS will warn you on first launch — right-click → Open to proceed.
          files: DexBar-${{ github.ref_name }}.zip

